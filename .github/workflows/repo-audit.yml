name: repo-audit

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      full_audit:
        description: "Run full TeX audit"
        required: false
        default: "false"
  schedule:
    - cron: "0 2 * * *"

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff jsonschema pyyaml
      - name: Doctor (fast)
        run: python3 scripts/reportctl.py doctor

  full:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_audit == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff jsonschema pyyaml
      - name: Doctor (full)
        run: python3 scripts/reportctl.py doctor --full
