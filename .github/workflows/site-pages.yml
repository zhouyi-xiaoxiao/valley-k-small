name: site-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      full_build:
        description: "Run full web-data rebuild"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "site/package-lock.json"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jsonschema pyyaml pytest ruff

      - name: Build web data + agent sync
        run: |
          MODE="changed"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_build }}" = "true" ]; then
            MODE="full"
          fi
          python3 scripts/reportctl.py web-data --mode "$MODE"
          python3 scripts/reportctl.py book-data
          python3 scripts/reportctl.py translation-qc
          python3 scripts/reportctl.py agent-sync
          python3 scripts/validate_web_data.py

      - name: Build static site
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
