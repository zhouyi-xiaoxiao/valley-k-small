<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#f7f3ea"/><text x="92" y="104" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#52606d">10-minute research talk</text><text x="92" y="166" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" fill="#18212a"><tspan x="92" dy="0">Hidden routes in first-passage time</tspan></text><text x="94" y="240" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="400" fill="#52606d"><tspan x="94" dy="0">A one-target 1D ring can still split into a fast route, a valley,</tspan><tspan x="94" dy="31">and a delayed route once one directed shortcut is present.</tspan></text><rect x="68" y="308" width="646" height="534" rx="38" fill="#f8f4ea"/><rect x="742" y="308" width="792" height="534" rx="38" fill="#f8f4ea"/><text x="112" y="360" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#18212a">Realistic 1D ring geometry</text><text x="112" y="394" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#52606d">Periodic ring, absorbing target, and one straight shortcut from u to v.</text><circle cx="430" cy="592" r="188" stroke="#c7ccc9" stroke-width="10" fill="none"/><line x1="612.0" y1="592.0" x2="624.0" y2="592.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="596.3" y1="666.0" x2="607.2" y2="670.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="551.8" y1="727.3" x2="559.8" y2="736.2" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="486.2" y1="765.1" x2="489.9" y2="776.5" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="411.0" y1="773.0" x2="409.7" y2="784.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="339.0" y1="749.6" x2="333.0" y2="760.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="282.8" y1="699.0" x2="273.1" y2="706.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="252.0" y1="629.8" x2="240.2" y2="632.3" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="252.0" y1="554.2" x2="240.2" y2="551.7" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="282.8" y1="485.0" x2="273.1" y2="478.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="339.0" y1="434.4" x2="333.0" y2="424.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="411.0" y1="411.0" x2="409.7" y2="399.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="486.2" y1="418.9" x2="489.9" y2="407.5" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="551.8" y1="456.7" x2="559.8" y2="447.8" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="596.3" y1="518.0" x2="607.2" y2="513.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><path d="M 261.0 509.6 A 188 188 0 1 0 617.5 578.9" stroke="#e6b266" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="16 12"/><path d="M 261.0 509.6 A 188 188 0 0 1 309.2 448.0" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 309.2 448.0 L 610.7 643.8" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 610.7 643.8 A 188 188 0 0 1 617.5 578.9" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><circle cx="261.0" cy="509.6" r="14" fill="#101827"/><circle cx="309.2" cy="448.0" r="11" fill="#d8891f"/><circle cx="610.7" cy="643.8" r="11" fill="#d8891f"/><circle cx="617.5" cy="578.9" r="15" fill="#3269d1"/><text x="227" y="555" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#18212a">start</text><text x="287" y="427" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">u</text><text x="594" y="619" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">v</text><text x="587" y="550" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#3269d1">target</text><path d="M 124 794 L 204 794" stroke="#1f7a73" stroke-width="8" fill="none" stroke-linecap="round"/><text x="218" y="801" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#52606d">shortcut-assisted route</text><path d="M 470 794 L 550 794" stroke="#e6b266" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="16 10"/><text x="564" y="801" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#52606d">long ring route</text><text x="786" y="360" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#18212a">Distribution-level picture</text><text x="786" y="394" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#52606d"><tspan x="786" dy="0">The same target can still generate an early peak, a valley,</tspan><tspan x="786" dy="26">and a delayed branch once both route families stay visible.</tspan></text><path d="M 824 746 L 1456 746" stroke="#b9c0bf" stroke-width="3"/><path d="M 824 746 L 824 478" stroke="#b9c0bf" stroke-width="3"/><path d="M 862 650 C 920 548 980 500 1038 516 C 1096 532 1144 630 1198 652 C 1262 678 1340 572 1416 552" stroke="#18212a" stroke-width="9" fill="none" stroke-linecap="round"/><circle cx="1038" cy="516" r="8" fill="#1f7a73"/><circle cx="1198" cy="652" r="8" fill="#d8891f"/><circle cx="1416" cy="552" r="8" fill="#d8891f"/><text x="998" y="500" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#1f7a73">peak1</text><text x="1158" y="694" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#52606d">valley</text><text x="1378" y="536" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#d8891f">peak2</text><text x="820" y="466" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500"