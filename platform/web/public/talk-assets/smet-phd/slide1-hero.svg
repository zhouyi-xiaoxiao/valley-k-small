<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#f7f3ea"/><text x="96" y="112" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#52606d">10-minute research talk</text><text x="96" y="192" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="700" fill="#18212a"><tspan x="96" dy="0">Hidden routes in first-passage time</tspan></text><text x="98" y="278" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="#52606d"><tspan x="98" dy="0">A one-target 1D ring can still split into a fast route,</tspan><tspan x="98" dy="36">a valley, and a delayed route once one directed shortcut is present.</tspan></text><rect x="74" y="348" width="648" height="468" rx="40" fill="#f8f4ea"/><rect x="812" y="348" width="706" height="468" rx="40" fill="#f8f4ea"/><text x="120" y="396" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#18212a">Realistic 1D ring geometry</text><text x="120" y="430" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#52606d">Periodic ring, absorbing target, and one straight shortcut from u to v.</text><circle cx="430" cy="608" r="188" stroke="#c7ccc9" stroke-width="10" fill="none"/><line x1="612.0" y1="608.0" x2="624.0" y2="608.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="596.3" y1="682.0" x2="607.2" y2="686.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="551.8" y1="743.3" x2="559.8" y2="752.2" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="486.2" y1="781.1" x2="489.9" y2="792.5" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="411.0" y1="789.0" x2="409.7" y2="800.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="339.0" y1="765.6" x2="333.0" y2="776.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="282.8" y1="715.0" x2="273.1" y2="722.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="252.0" y1="645.8" x2="240.2" y2="648.3" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="252.0" y1="570.2" x2="240.2" y2="567.7" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="282.8" y1="501.0" x2="273.1" y2="494.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="339.0" y1="450.4" x2="333.0" y2="440.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="411.0" y1="427.0" x2="409.7" y2="415.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="486.2" y1="434.9" x2="489.9" y2="423.5" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="551.8" y1="472.7" x2="559.8" y2="463.8" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="596.3" y1="534.0" x2="607.2" y2="529.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><path d="M 261.0 525.6 A 188 188 0 1 0 617.5 594.9" stroke="#e6b266" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="16 12"/><path d="M 261.0 525.6 A 188 188 0 0 1 309.2 464.0" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 309.2 464.0 L 610.7 659.8" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 610.7 659.8 A 188 188 0 0 1 617.5 594.9" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><circle cx="261.0" cy="525.6" r="14" fill="#101827"/><circle cx="309.2" cy="464.0" r="11" fill="#d8891f"/><circle cx="610.7" cy="659.8" r="11" fill="#d8891f"/><circle cx="617.5" cy="594.9" r="15" fill="#3269d1"/><text x="227" y="571" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#18212a">start</text><text x="287" y="443" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">u</text><text x="594" y="635" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">v</text><text x="587" y="566" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#3269d1">target</text><text x="856" y="396" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#18212a">Distribution-level picture</text><text x="856" y="430" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#52606d"><tspan x="856" dy="0">The same target can still generate an early peak, a valley,</tspan><tspan x="856" dy="28">and a delayed branch once both route families stay visible.</tspan></text><path d="M 876 714 L 1456 714" stroke="#b9c0bf" stroke-width="3"/><path d="M 876 714 L 876 502" stroke="#b9c0bf" stroke-width="3"/><path d="M 906 686 C 962 546 1030 500 1098 544 C 1144 574 1186 654 1238 644 C 1300 632 1338 520 1408 540 C 1440 550 1458 574 1488 612" stroke="#18212a" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="1016" cy="556" r="8" fill="#1f7a73"/><circle cx="1232" cy="644" r="8" fill="#d8891f"/><circle cx="1412" cy="540" r="8" fill="#d8891f"/><text x="978" y="540" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#1f7a73">peak1</text><text x="1202" y="684" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#52606d">valley</text><text x="1376" y="524" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#d8891f">peak2</text><text x="874" y="490" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#52606d">density</text><text x="1428" y="752" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#52606d">time</text></svg>