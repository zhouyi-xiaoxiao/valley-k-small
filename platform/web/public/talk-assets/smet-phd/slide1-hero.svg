<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#f7f3ea"/><text x="92" y="104" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#52606d">10-minute research talk</text><text x="92" y="166" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" fill="#18212a"><tspan x="92" dy="0">Hidden routes in first-passage time</tspan></text><text x="94" y="240" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="400" fill="#52606d"><tspan x="94" dy="0">A one-target 1D ring can still split into a fast route, a valley,</tspan><tspan x="94" dy="31">and a delayed route once one directed shortcut is present.</tspan></text><rect x="68" y="308" width="646" height="534" rx="38" fill="#f8f4ea"/><rect x="742" y="308" width="792" height="534" rx="38" fill="#f8f4ea"/><text x="112" y="360" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#18212a">Realistic 1D ring geometry</text><text x="112" y="394" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#52606d">Periodic ring, absorbing target, and one straight shortcut from u to v.</text><circle cx="430" cy="604" r="198" stroke="#c7ccc9" stroke-width="10" fill="none"/><line x1="622.0" y1="604.0" x2="634.0" y2="604.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="605.4" y1="682.1" x2="616.4" y2="687.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="558.5" y1="746.7" x2="566.5" y2="755.6" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="489.3" y1="786.6" x2="493.0" y2="798.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="409.9" y1="794.9" x2="408.7" y2="806.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="334.0" y1="770.3" x2="328.0" y2="780.7" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="274.7" y1="716.9" x2="265.0" y2="723.9" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="242.2" y1="643.9" x2="230.5" y2="646.4" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="242.2" y1="564.1" x2="230.5" y2="561.6" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="274.7" y1="491.1" x2="265.0" y2="484.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="334.0" y1="437.7" x2="328.0" y2="427.3" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="409.9" y1="413.1" x2="408.7" y2="401.1" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="489.3" y1="421.4" x2="493.0" y2="410.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="558.5" y1="461.3" x2="566.5" y2="452.4" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><line x1="605.4" y1="525.9" x2="616.4" y2="521.0" stroke="#cfd5d0" stroke-width="2.5" stroke-linecap="round"/><path d="M 252.0 517.2 A 198 198 0 1 0 627.5 590.2" stroke="#e6b266" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="16 12"/><path d="M 252.0 517.2 A 198 198 0 0 1 302.7 452.3" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 302.7 452.3 L 620.3 658.6" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M 620.3 658.6 A 198 198 0 0 1 627.5 590.2" stroke="#1f7a73" stroke-width="10" fill="none" stroke-linecap="round"/><circle cx="252.0" cy="517.2" r="14" fill="#101827"/><circle cx="302.7" cy="452.3" r="11" fill="#d8891f"/><circle cx="620.3" cy="658.6" r="11" fill="#d8891f"/><circle cx="627.5" cy="590.2" r="15" fill="#3269d1"/><text x="218" y="563" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#18212a">start</text><text x="280" y="432" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">u</text><text x="604" y="634" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#d8891f">v</text><text x="597" y="562" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#3269d1">target</text><text x="786" y="360" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#18212a">Distribution-level picture</text><text x="786" y="394" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#52606d"><tspan x="786" dy="0">The same target can still generate an early peak, a valley,</tspan><tspan x="786" dy="26">and a delayed branch once both route families stay visible.</tspan></text><path d="M 798 740 L 1476 740" stroke="#b9c0bf" stroke-width="3"/><path d="M 798 740 L 798 478" stroke="#b9c0bf" stroke-width="3"/><path d="M 130 560 C 220 455 290 320 370 300 C 470 276 545 390 635 435 C 760 500 930 275 1090 300 C 1230 318 1320 450 1415 500" transform="translate(720,-70)" stroke="#18212a" stroke-width="9" fill="none" stroke-linecap="round"/><circle cx="1085" cy="490" r="8" fill="#1f7a73"/><circle cx="1355" cy="575" r="8" fill="#d8891f"/><circle cx="1490" cy="475" r="8" fill="#d8891f"/><text x="1046" y="474" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#1f7a73">peak1</text><text x="1320" y="615" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#52606d">valley</text><text x="1452" y="458" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#d8891f">peak2</text><text x="794" y="464" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#52606d">density</text><text x="1448" y="778" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#52606d">time</text></svg>