<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ee"/>
      <stop offset="100%" stop-color="#f1ede5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#fbf7ef"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 H 0 V 36" fill="none" stroke="#d9ddd7" stroke-width="1" stroke-opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#b6aea1" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(72,54)">
    <rect width="1456" height="792" rx="40" fill="url(#card)" stroke="#ddd7ca" filter="url(#shadow)"/>
    <text x="46" y="70" font-size="24" font-family="Helvetica, Arial, sans-serif" fill="#75807a">10-minute research talk</text>
    <text x="46" y="138" font-size="66" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#101826">Hidden routes in first-passage time</text>
    <text x="46" y="186" font-size="30" font-family="Helvetica, Arial, sans-serif" fill="#556070">One target can still generate a fast branch, a valley, and a late branch.</text>

    <g transform="translate(46,238)">
      <rect width="1364" height="474" rx="32" fill="#fffefb" stroke="#e3ddd2"/>

      <g transform="translate(44,40)">
        <text x="0" y="0" font-size="22" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#24303d">A geometry-level picture</text>
        <text x="0" y="30" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5f6976">The same target can be reached by a direct branch and by a delayed detour.</text>

        <g transform="translate(10,78)">
          <circle cx="240" cy="180" r="150" fill="none" stroke="#c8cec7" stroke-width="10"/>
          <path d="M 134 286 C 186 256, 232 220, 272 184 C 322 138, 374 114, 476 106" fill="none" stroke="#16837b" stroke-width="10" stroke-linecap="round"/>
          <path d="M 134 286 C 164 190, 186 114, 238 70 C 292 24, 378 22, 446 70 C 478 92, 496 102, 476 106" fill="none" stroke="#d58927" stroke-width="9" stroke-linecap="round" stroke-dasharray="18 12"/>
          <path d="M 134 286 C 188 300, 258 298, 320 274 C 390 246, 446 198, 494 138" fill="none" stroke="#aab1b8" stroke-width="6" stroke-linecap="round" opacity="0.42"/>
          <circle cx="134" cy="286" r="18" fill="#111827"/>
          <circle cx="476" cy="106" r="18" fill="#2563eb"/>
          <circle cx="134" cy="286" r="32" fill="none" stroke="#111827" stroke-opacity="0.12" stroke-width="8"/>
          <circle cx="476" cy="106" r="32" fill="none" stroke="#2563eb" stroke-opacity="0.14" stroke-width="8"/>
          <text x="108" y="342" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#283340">start</text>
          <text x="450" y="70" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#2563eb">target</text>
          <text x="306" y="210" font-size="18" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#16837b">fast route</text>
          <text x="262" y="42" font-size="18" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#d58927">slow route</text>
        </g>
      </g>

      <g transform="translate(780,52)">
        <text x="0" y="0" font-size="22" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#24303d">A distribution-level picture</text>
        <text x="0" y="30" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5f6976">The measured hit-time curve separates the two route families into two timescales.</text>

        <g transform="translate(0,74)">
          <rect width="520" height="320" rx="26" fill="#fdfbf6" stroke="#e5e1d8"/>
          <rect width="520" height="320" rx="26" fill="url(#grid)" opacity="0.35"/>
          <line x1="52" y1="266" x2="470" y2="266" stroke="#d0d6d0" stroke-width="3"/>
          <line x1="52" y1="266" x2="52" y2="48" stroke="#d0d6d0" stroke-width="3"/>
          <path d="M 52 264 C 78 250, 102 194, 132 162 C 168 124, 204 118, 238 156 C 270 192, 302 224, 336 224 C 368 224, 394 172, 424 126 C 448 92, 460 82, 470 82" fill="none" stroke="#202936" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="132" cy="162" r="8" fill="#16837b"/>
          <circle cx="424" cy="126" r="8" fill="#d58927"/>
          <text x="102" y="146" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#16837b">peak 1</text>
          <text x="246" y="236" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">valley</text>
          <text x="392" y="108" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#d58927">late peak</text>
          <text x="16" y="60" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">density</text>
          <text x="402" y="300" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">time</text>
        </g>

        <g transform="translate(0,420)">
          <rect width="520" height="40" rx="18" fill="#f6f1e7" stroke="#e2dacd"/>
          <text x="18" y="26" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#4f5b67">The talk asks what mechanism makes this split appear and persist.</text>
        </g>
      </g>
    </g>
  </g>
</svg>
