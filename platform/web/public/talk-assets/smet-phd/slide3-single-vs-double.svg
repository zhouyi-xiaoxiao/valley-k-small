<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#f7f3ea"/><text x="96" y="110" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#52606d">Shape already hints at mechanism</text><text x="96" y="184" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" fill="#18212a"><tspan x="96" dy="0">Why a double peak matters</tspan></text><text x="98" y="258" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#52606d"><tspan x="98" dy="0">A single peak usually means one dominant arrival scale.</tspan><tspan x="98" dy="34">A double peak means two route families stay visible in the statistics.</tspan></text><rect x="88" y="330" width="670" height="486" rx="34" fill="#f8f4ea"/><rect x="844" y="330" width="670" height="486" rx="34" fill="#f8f4ea"/><text x="132" y="388" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#18212a">single peak</text><text x="132" y="426" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#52606d">one dominant timescale</text><path d="M 160 706 L 666 706" stroke="#b9c0bf" stroke-width="3"/><path d="M 160 706 L 160 448" stroke="#b9c0bf" stroke-width="3"/><path d="M 184 678 C 256 550 362 492 470 520 C 552 542 616 612 654 650" stroke="#1f7a73" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="416" cy="553" r="8" fill="#1f7a73"/><text x="380" y="538" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#1f7a73">one peak</text><text x="888" y="388" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#18212a">double peak</text><text x="888" y="426" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#52606d">two route families stay visible</text><path d="M 918 706 L 1424 706" stroke="#b9c0bf" stroke-width="3"/><path d="M 918 706 L 918 448" stroke="#b9c0bf" stroke-width="3"/><path d="M 944 676 C 1002 564 1058 522 1116 564 C 1162 598 1204 666 1264 648 C 1310 634 1358 532 1412 548" stroke="#18212a" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="1030" cy="562" r="8" fill="#1f7a73"/><circle cx="1200" cy="648" r="8" fill="#d8891f"/><circle cx="1360" cy="548" r="8" fill="#d8891f"/><text x="996" y="548" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#1f7a73">peak1</text><text x="1168" y="686" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#52606d">valley</text><text x="1328" y="534" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#d8891f">peak2</text></svg>