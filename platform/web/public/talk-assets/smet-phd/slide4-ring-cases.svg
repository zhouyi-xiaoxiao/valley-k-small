<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ed"/>
      <stop offset="100%" stop-color="#f1ede5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#fbf8f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#aea89a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(72,54)">
    <rect width="1456" height="792" rx="40" fill="url(#card)" stroke="#ddd7ca" filter="url(#shadow)"/>
    <text x="44" y="68" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#75807a">single-target ring</text>
    <text x="44" y="126" font-size="56" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#121826">One ring can show either one peak or two</text>
    <text x="44" y="170" font-size="28" font-family="Helvetica, Arial, sans-serif" fill="#556070">The key difference is whether the fast branch and the delayed branch are clearly separated.</text>

    <g transform="translate(44,226)">
      <g>
        <rect width="652" height="478" rx="32" fill="#fff" stroke="#e3ddd2"/>
        <text x="36" y="52" font-size="30" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#17202d">Single-peak case</text>
        <text x="36" y="84" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">The fast route does not separate enough from the rest of the circulation.</text>
        <g transform="translate(34,128)">
          <circle cx="170" cy="146" r="114" fill="none" stroke="#c6cdc6" stroke-width="9"/>
          <path d="M 170 32 Q 234 78 282 144" fill="none" stroke="#d58927" stroke-width="7" stroke-dasharray="14 10"/>
          <path d="M 170 32 C 174 72 198 106 282 144" fill="none" stroke="#16837b" stroke-width="8" stroke-linecap="round"/>
          <path d="M 170 32 C 90 86 102 220 282 144" fill="none" stroke="#9ca3af" stroke-width="5" stroke-linecap="round" opacity="0.48"/>
          <circle cx="170" cy="32" r="12" fill="#111827"/>
          <circle cx="282" cy="144" r="12" fill="#2563eb"/>
          <text x="140" y="10" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#374151">start</text>
          <text x="248" y="182" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#2563eb">target</text>
        </g>
        <g transform="translate(352,118)">
          <rect width="260" height="220" rx="22" fill="#fdfbf6" stroke="#e5e1d8"/>
          <line x1="34" y1="184" x2="230" y2="184" stroke="#d1d7d0" stroke-width="3"/>
          <line x1="34" y1="184" x2="34" y2="34" stroke="#d1d7d0" stroke-width="3"/>
          <path d="M 34 182 C 64 172, 94 126, 124 96 C 150 70, 176 62, 204 92 C 222 112, 232 136, 230 168" fill="none" stroke="#16837b" stroke-width="6" stroke-linecap="round"/>
          <text x="112" y="64" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#16837b">one broad peak</text>
        </g>
      </g>

      <g transform="translate(716,0)">
        <rect width="652" height="478" rx="32" fill="#fff" stroke="#e3ddd2"/>
        <text x="36" y="52" font-size="30" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#17202d">Double-peak case</text>
        <text x="36" y="84" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">A shortcut creates a visible fast branch while a delayed detour still survives.</text>
        <g transform="translate(34,128)">
          <circle cx="170" cy="146" r="114" fill="none" stroke="#c6cdc6" stroke-width="9"/>
          <path d="M 170 32 Q 258 72 286 110" fill="none" stroke="#d58927" stroke-width="7" stroke-dasharray="14 10"/>
          <path d="M 170 32 C 202 72 232 96 286 110" fill="none" stroke="#16837b" stroke-width="8" stroke-linecap="round"/>
          <path d="M 170 32 C 104 82 90 220 280 184" fill="none" stroke="#9ca3af" stroke-width="5" stroke-linecap="round" opacity="0.48"/>
          <path d="M 286 110 C 300 126 300 150 282 182" fill="none" stroke="#16837b" stroke-width="8" stroke-linecap="round"/>
          <circle cx="170" cy="32" r="12" fill="#111827"/>
          <circle cx="282" cy="182" r="12" fill="#2563eb"/>
          <text x="140" y="10" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#374151">start</text>
          <text x="248" y="220" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#2563eb">target</text>
        </g>
        <g transform="translate(352,118)">
          <rect width="260" height="220" rx="22" fill="#fdfbf6" stroke="#e5e1d8"/>
          <line x1="34" y1="184" x2="230" y2="184" stroke="#d1d7d0" stroke-width="3"/>
          <line x1="34" y1="184" x2="34" y2="34" stroke="#d1d7d0" stroke-width="3"/>
          <path d="M 34 182 C 56 168, 70 110, 96 88 C 120 68, 146 74, 164 112 C 180 146, 184 162, 194 164 C 210 166, 220 120, 230 84" fill="none" stroke="#202936" stroke-width="6" stroke-linecap="round"/>
          <circle cx="96" cy="88" r="7" fill="#16837b"/>
          <circle cx="230" cy="84" r="7" fill="#d58927"/>
          <text x="72" y="74" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#16837b">peak 1</text>
          <text x="146" y="164" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">valley</text>
          <text x="192" y="68" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#d58927">peak 2</text>
        </g>
      </g>
    </g>
  </g>
</svg>
