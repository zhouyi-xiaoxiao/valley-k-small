<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ec"/>
      <stop offset="100%" stop-color="#f1ede4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#aea89a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(72,54)">
    <rect width="1456" height="792" rx="40" fill="url(#card)" stroke="#ddd7ca" filter="url(#shadow)"/>
    <text x="44" y="68" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#75807a">recent single-target result</text>
    <text x="44" y="126" font-size="56" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#121826">Route configuration changes whether peak 2 survives</text>
    <text x="44" y="170" font-size="28" font-family="Helvetica, Arial, sans-serif" fill="#556070">Changing the shortcut destination reweights the late branch instead of simply shifting one average time.</text>

    <g transform="translate(44,224)">
      <rect width="720" height="488" rx="32" fill="#fff" stroke="#e3ddd2"/>
      <text x="34" y="48" font-size="28" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#17202d">Measured scan across route destinations</text>
      <text x="34" y="78" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">The late-branch weight does not vary monotonically. Some destinations strengthen it; some almost erase it.</text>
      <g transform="translate(34,112)">
        <rect width="652" height="322" rx="22" fill="#fdfbf6" stroke="#e5e1d8"/>
        <line x1="52" y1="274" x2="612" y2="274" stroke="#d1d7d0" stroke-width="3"/>
        <line x1="52" y1="274" x2="52" y2="34" stroke="#d1d7d0" stroke-width="3"/>
        <path d="M 52 256 C 120 244, 158 224, 212 170 C 254 128, 308 88, 372 100 C 420 108, 458 150, 516 190 C 552 216, 584 236, 612 248" fill="none" stroke="#d58927" stroke-width="7" stroke-linecap="round"/>
        <circle cx="212" cy="170" r="8" fill="#d58927"/>
        <circle cx="372" cy="100" r="8" fill="#16837b"/>
        <circle cx="516" cy="190" r="8" fill="#202936"/>
        <text x="170" y="152" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#d58927">late branch grows</text>
        <text x="334" y="82" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#16837b">clearest bimodal regime</text>
        <text x="484" y="214" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#202936">late branch weakens</text>
        <text x="20" y="48" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">peak 2</text>
        <text x="524" y="306" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">destination</text>
      </g>
    </g>

    <g transform="translate(804,224)">
      <rect width="608" height="488" rx="32" fill="#fff" stroke="#e3ddd2"/>
      <text x="34" y="48" font-size="28" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#17202d">Three route stories</text>
      <text x="34" y="78" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">The same ring can tell three very different arrival stories once the shortcut is retuned.</text>

      <g transform="translate(34,120)">
        <g>
          <rect width="540" height="88" rx="20" fill="#f8f5ee" stroke="#e5dfd3"/>
          <circle cx="34" cy="44" r="7" fill="#202936"/>
          <text x="56" y="36" font-size="20" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#202936">too weak</text>
          <text x="56" y="64" font-size="17" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">The shortcut fails to separate the fast branch cleanly.</text>
        </g>
        <g transform="translate(0,118)">
          <rect width="540" height="88" rx="20" fill="#f8f5ee" stroke="#e5dfd3"/>
          <circle cx="34" cy="44" r="7" fill="#16837b"/>
          <text x="56" y="36" font-size="20" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#202936">well tuned</text>
          <text x="56" y="64" font-size="17" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">Fast and slow branches both stay visible, so the split is clearest.</text>
        </g>
        <g transform="translate(0,236)">
          <rect width="540" height="88" rx="20" fill="#f8f5ee" stroke="#e5dfd3"/>
          <circle cx="34" cy="44" r="7" fill="#d58927"/>
          <text x="56" y="36" font-size="20" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#202936">too strong</text>
          <text x="56" y="64" font-size="17" font-family="Helvetica, Arial, sans-serif" fill="#5d6672">The fast route dominates so much that the delayed branch flattens out.</text>
        </g>
      </g>
    </g>
  </g>
</svg>
