<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#f2efe7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0%" stop-color="#d9eee8"/>
      <stop offset="100%" stop-color="#f4ead9"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#d8ddd7" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#a8aaab" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(72,54)">
    <rect width="1456" height="792" rx="40" fill="#fffefb" stroke="#ddd7ca" filter="url(#shadow)"/>

    <text x="42" y="62" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#74807c">mechanism check</text>
    <text x="42" y="126" font-size="56" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#121826">Membrane helps, but it plateaus</text>
    <text x="42" y="170" font-size="27" font-family="Helvetica, Arial, sans-serif" fill="#556070">Increasing permeability raises the membrane-related share, but only up to about 50%.</text>

    <g transform="translate(44,220)">
      <text x="0" y="30" font-size="26" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">1-target corridor permeability sweep</text>
      <text x="0" y="62" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#667085">The membrane route becomes more visible, but it never takes over the whole late branch.</text>

      <g transform="translate(0,96)">
        <g transform="translate(0,0)">
          <text x="110" y="-8" font-size="22" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#374151">low</text>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#panel)" stroke="#ced7d0"/>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#grid)" opacity="0.55"/>
          <rect x="30" y="86" width="220" height="172" rx="18" fill="#fbfcfb" stroke="#d7dfd7"/>
          <line x1="140" y1="102" x2="140" y2="242" stroke="#6b7280" stroke-width="8" opacity="0.75"/>
          <circle cx="58" cy="172" r="15" fill="#c0392b"/>
          <circle cx="222" cy="172" r="15" fill="#2563eb"/>
          <path d="M 58 172 C 92 140, 114 132, 140 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 164 148, 188 144, 222 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round" opacity="0.22"/>
          <path d="M 58 172 C 92 196, 116 206, 140 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 164 160, 188 156, 222 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round" opacity="0.92"/>
          <text x="34" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">start</text>
          <text x="192" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">target</text>
          <text x="28" y="286" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">membrane branch is present but small</text>
          <rect x="28" y="298" width="224" height="26" rx="13" fill="#eef2ef" stroke="#d8ddd7"/>
          <rect x="28" y="298" width="54" height="26" rx="13" fill="#dd8a24"/>
          <text x="102" y="317" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">~18%</text>
        </g>

        <g transform="translate(320,0)">
          <text x="110" y="-8" font-size="22" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#374151">mid</text>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#panel)" stroke="#ced7d0"/>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#grid)" opacity="0.55"/>
          <rect x="30" y="86" width="220" height="172" rx="18" fill="#fbfcfb" stroke="#d7dfd7"/>
          <line x1="140" y1="102" x2="140" y2="242" stroke="#6b7280" stroke-width="8" opacity="0.75"/>
          <circle cx="58" cy="172" r="15" fill="#c0392b"/>
          <circle cx="222" cy="172" r="15" fill="#2563eb"/>
          <path d="M 58 172 C 92 140, 114 132, 140 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 164 148, 188 144, 222 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round" opacity="0.42"/>
          <path d="M 58 172 C 92 196, 116 206, 140 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 162 150, 186 146, 222 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round" opacity="0.96"/>
          <text x="34" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">start</text>
          <text x="192" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">target</text>
          <text x="28" y="286" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">membrane branch becomes competitive</text>
          <rect x="28" y="298" width="224" height="26" rx="13" fill="#eef2ef" stroke="#d8ddd7"/>
          <rect x="28" y="298" width="106" height="26" rx="13" fill="#dd8a24"/>
          <text x="154" y="317" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">~36%</text>
        </g>

        <g transform="translate(640,0)">
          <text x="108" y="-8" font-size="22" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#374151">high</text>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#panel)" stroke="#ced7d0"/>
          <rect x="0" y="14" width="282" height="320" rx="24" fill="url(#grid)" opacity="0.55"/>
          <rect x="30" y="86" width="220" height="172" rx="18" fill="#fbfcfb" stroke="#d7dfd7"/>
          <line x1="140" y1="102" x2="140" y2="242" stroke="#6b7280" stroke-width="8" opacity="0.75"/>
          <circle cx="58" cy="172" r="15" fill="#c0392b"/>
          <circle cx="222" cy="172" r="15" fill="#2563eb"/>
          <path d="M 58 172 C 92 140, 114 132, 140 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 162 146, 186 142, 222 172" fill="none" stroke="#2f7a7d" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
          <path d="M 58 172 C 92 196, 116 206, 140 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round"/>
          <path d="M 140 172 C 160 146, 184 142, 222 172" fill="none" stroke="#dd8a24" stroke-width="6" stroke-linecap="round" opacity="0.98"/>
          <text x="34" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">start</text>
          <text x="192" y="216" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">target</text>
          <text x="28" y="286" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">growth slows down near a ceiling</text>
          <rect x="28" y="298" width="224" height="26" rx="13" fill="#eef2ef" stroke="#d8ddd7"/>
          <rect x="28" y="298" width="144" height="26" rx="13" fill="#dd8a24"/>
          <text x="192" y="317" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#556070">~49%</text>
        </g>
      </g>
    </g>

    <g transform="translate(1028,250)">
      <text x="0" y="30" font-size="26" font-weight="700" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">Saturation, not takeover</text>
      <text x="0" y="62" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#667085">A membrane-only explanation would keep rising toward 100%. That is not what the scan shows.</text>

      <g transform="translate(0,92)">
        <rect width="340" height="284" rx="26" fill="#fdfcf7" stroke="#e4e1d7"/>
        <line x1="52" y1="232" x2="304" y2="232" stroke="#c3cbc3" stroke-width="3"/>
        <line x1="52" y1="232" x2="52" y2="52" stroke="#c3cbc3" stroke-width="3"/>
        <text x="18" y="236" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">0%</text>
        <text x="10" y="192" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">25%</text>
        <text x="10" y="148" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">50%</text>
        <text x="10" y="104" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">75%</text>
        <line x1="52" y1="144" x2="304" y2="144" stroke="#2f7a7d" stroke-width="4" stroke-dasharray="10 8" opacity="0.65"/>
        <text x="180" y="132" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#2f7a7d">plateau near 50%</text>
        <path d="M 52 208 C 94 182, 136 164, 174 154 C 214 144, 258 140, 304 140" fill="none" stroke="#dd8a24" stroke-width="8" stroke-linecap="round"/>
        <circle cx="88" cy="194" r="7" fill="#dd8a24"/>
        <circle cx="178" cy="154" r="7" fill="#dd8a24"/>
        <circle cx="292" cy="141" r="7" fill="#dd8a24"/>
        <text x="76" y="258" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">low</text>
        <text x="168" y="258" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">mid</text>
        <text x="276" y="258" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">high</text>
      </g>

      <g transform="translate(0,414)">
        <rect width="340" height="110" rx="22" fill="#f7f4ee" stroke="#e5ddd0"/>
        <text x="20" y="42" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#475467">Conclusion:</text>
        <text x="20" y="70" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#475467">the membrane contributes to peak2,</text>
        <text x="20" y="96" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#475467">but it does not control it by itself.</text>
      </g>
    </g>
  </g>
</svg>
